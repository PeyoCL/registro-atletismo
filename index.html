<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Generador de Marcador Estadio</title>
  
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    body{font-family:-apple-system,sans-serif;padding:15px;background:#f0f2f5;margin:0;color:#3c4043}.container{max-width:450px;margin:0 auto;background:#fff;padding:24px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}h2{color:#1a73e8;font-size:1.4rem;text-align:center;margin:0 0 10px}.bajada{font-size:13px;text-align:center;color:#5f6368;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #eee}label{display:block;margin-top:14px;font-weight:700;font-size:14px}.hint{font-size:11px;color:#70757a;margin-bottom:5px}input,select{width:100%;padding:12px;margin-top:5px;border:2px solid #dadce0;border-radius:10px;font-size:15px;outline:0;box-sizing:border-box;transition:border-color .2s}input:focus,select:focus{border-color:#1a73e8}button{width:100%;padding:16px;background:#1a73e8;color:#fff;border:0;border-radius:12px;margin-top:20px;font-size:16px;font-weight:700;cursor:pointer}.btn-copy{background:#34a853;margin-top:15px}.btn-clear{background:0 0;color:#5f6368;border:2px solid #dadce0;margin-top:10px}.btn-clear:hover{background:#f8f9fa;border-color:#bdc1c6}.btn-adv{background:0 0;color:#1a73e8;border:2px dashed #1a73e8;padding:10px;margin-top:15px;font-size:13px;border-radius:10px}.btn-adv:hover{background:#f4f8fe}.adv-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #dadce0}.sub-panel{display:none;margin-left:10px;padding-left:10px;border-left:2px solid #1a73e8}#resultado{margin-top:25px;display:none;background:#f8f9fa;padding:15px;border-radius:12px}.link-box{background:#fff;padding:12px;border-radius:8px;word-break:break-all;font-size:11px;border:1px solid #1a73e8;color:#174ea6;font-family:monospace}#copy-toast{display:none;margin-top:10px;padding:10px;background:#e6f4ea;color:#137333;border-radius:8px;text-align:center;font-size:13px;font-weight:700}.error-box{display:none;background:#fce8e6;color:#d93025;padding:12px;border-radius:10px;margin-top:15px;font-size:14px;font-weight:700;text-align:center;border:1px solid #fad2cf}.input-error{border-color:#d93025!important;background-color:#fff9f9!important}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <h2>Asistente de Marcador</h2>
    <p class="bajada">Genera tu enlace pre-llenado.</p>
    
    <label>Nombre del Atleta:</label>
    <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
    
    <label>RUT Atleta:</label>
    <div class="hint">Formatos: 12345678-9, 12.345.678-9 o 123456789</div>
    <input type="text" id="rut" placeholder="12.345.678-9">
    
    <button type="button" class="btn-adv" id="toggle_adv" onclick="toggleAdvanced()">⚙️ Opciones Avanzadas</button>
    
    <div class="adv-panel" id="adv_panel">
      <label>Institución / Club / Colegio:</label>
      <input type="text" id="club">
      <label>Profesor a cargo:</label>
      <input type="text" id="profesor">
      <label>Disciplina Deportiva:</label>
      <select id="disciplina" onchange="checkOtros('disciplina', 'div_otra_disc')">
        <option value="Atletismo">Atletismo</option>
        <option value="Natación">Natación</option>
        <option value="Hockey patín">Hockey patín</option>
        <option value="Tenis de mesa">Tenis de mesa</option>
        <option value="Acondicionamiento físico">Acondicionamiento físico</option>
        <option value="Entrenamiento funcional">Entrenamiento funcional</option>
        <option value="Yoga">Yoga</option>
        <option value="Zumba">Zumba</option>
        <option value="Baile entretenido">Baile entretenido</option>
        <option value="Halterofilia">Halterofilia</option>
        <option value="Karate">Karate</option>
        <option value="Fútbol">Fútbol</option>
        <option value="Balonmano">Balonmano</option>
        <option value="Taekwondo">Taekwondo</option>
        <option value="Futsal">Futsal</option>
        <option value="Judo">Judo</option>
        <option value="Patinaje">Patinaje</option>
        <option value="Otra actividad o deporte">Otra actividad o deporte</option>
        <option value="Otros">Otros</option>
      </select>
      <div class="sub-panel" id="div_otra_disc">
        <label>Escriba el deporte:</label>
        <input type="text" id="otra_disc_txt" placeholder="Ej: Vóleibol">
      </div>
      <label>Categoría de Usuario:</label>
      <select id="categoria">
        <option value="CEM">CEM</option>
        <option value="DPS">DPS</option>
        <option value="PROMESAS CHILE">PROMESAS CHILE</option>
        <option value="USUARIO DE CLUBES DEPORTIVOS EN CONVENIO CON IND">Usuario Clubes en Convenio IND</option>
        <option value="USUARIO PARTICULAR (No pertenece a los programas anteriores)">Usuario Particular</option>
      </select>
      <label>Recinto a utilizar:</label>
      <select id="recinto" onchange="checkOtros('recinto', 'div_otro_rec')">
        <option value="Piscina Temperada">Piscina Temperada</option>
        <option value="Piscina al Aire Libre">Piscina al Aire Libre</option>
        <option value="Salón de Tenis de Mesa (Cendyr)">Salón de Tenis de Mesa (Cendyr)</option>
        <option value="Pista Atlética">Pista Atlética</option>
        <option value="Zona Calentamiento Sur">Zona Calentamiento Sur</option>
        <option value="Zona Calentamiento Norte">Zona Calentamiento Norte</option>
        <option value="Sala de Prensa">Sala de Prensa</option>
        <option value="Sala Multiuso 3er Piso">Sala Multiuso 3er Piso</option>
        <option value="Parque Piscina Temperada">Parque Piscina Temperada</option>
        <option value="Sala Conferencias">Sala Conferencias</option>
        <option value="Complejo Deportivo (5 Norte)">Complejo Deportivo (5 Norte)</option>
        <option value="Cancha Hockey/Balonmano">Cancha Hockey/Balonmano</option>
        <option value="Sala Musculación Piscina Temperada">Sala Musculación Piscina Temperada</option>
        <option value="Cancha Central Estadio Fiscal">Cancha Central Estadio Fiscal</option>
        <option value="Sala de Musculacion de Canotaje (Sala 70)">Sala de Musculacion de Canotaje (Sala 70)</option>
        <option value="Sala de Musculacion (Cendyr)">Sala de Musculacion (Cendyr)</option>
        <option value="Salón de Karate (Cendyr)">Salón de Karate (Cendyr)</option>
        <option value="Sala de Halterofilia (Cendyr)">Sala de Halterofilia (Cendyr)</option>
        <option value="Otros">Otros</option>
      </select>
      <div class="sub-panel" id="div_otro_rec">
        <label>Escriba el recinto:</label>
        <input type="text" id="otro_rec_txt" placeholder="Ej: Camarin 3">
      </div>
    </div>
    
    <div id="error-box" class="error-box"></div>
    <button id="proc_btn" onclick="generarLink()">GENERAR MARCADOR</button>
    
    <div id="resultado">
      <label>Tu enlace de acceso pre-llenado:</label>
      <div id="urlFinal" class="link-box"></div>
      <button class="btn-copy" id="btnCopiar" onclick="copiarLink()">📋 COPIAR MARCADOR</button>
      <button class="btn-clear" onclick="limpiarFormulario()">🔄 LIMPIAR FORMULARIO</button>
      <div id="copy-toast">✅ ¡Copiado con éxito!</div>
    </div>
  </div>

  <script>
    let supabaseClient=null;try{if(window.supabase){supabaseClient=window.supabase.createClient('https://gqnpifjiqrnogvwyvowp.supabase.co','sb_publishable__XW0a236It7jN1zUvh0UYQ_Cu-zqUg3');}}catch(e){console.warn("DB error");}const formBaseUrl="https://docs.google.com/forms/d/e/1FAIpQLSefzqFH89j9THSO5N2yVygkleVbilCDPJuNxOs7SF0cojBkpw/viewform";const _0x4f=["","ZW50cnkuNTMzMzg5NjUz","ZW50cnkuNzcxODQwMDM0","ZW50cnkuMTU3NDIwNzIxMg==","ZW50cnkuMTUzNTI1NjI1Ng==","ZW50cnkuMTA3MDk2MjQ4Nw==","ZW50cnkuMTM1OTg2NDI5OA==","ZW50cnkuNTI0NzE3OTgw"];const _v=(i)=>atob(_0x4f[i]);const _b64={club:"Q29sZWdpbyBNb250ZXNzb3Jp",prof:"THVrYXMgU2F6byB5IEFyaWVsIFRvcnJlcw==",disc:"QXRsZXRpc21v",cat:"VVNVQVJJTyBQQVJUSUNVTEFSIChObyBwZXJ0ZW5lY2UgYSBsb3MgcHJvZ3JhbWFzIGFudGVyaW9yZXMp",rec:"UGlzdGEgQXRsw6l0aWNh"};const _d64=(str)=>decodeURIComponent(escape(atob(str)));window.setDefaults=function(){document.getElementById('club').value=_d64(_b64.club);document.getElementById('profesor').value=_d64(_b64.prof);document.getElementById('disciplina').value=_d64(_b64.disc);document.getElementById('categoria').value=_d64(_b64.cat);document.getElementById('recinto').value=_d64(_b64.rec);document.getElementById('otra_disc_txt').value="";document.getElementById('div_otra_disc').style.display='none';document.getElementById('otro_rec_txt').value="";document.getElementById('div_otro_rec').style.display='none';};window.toggleAdvanced=function(){const p=document.getElementById('adv_panel');const b=document.getElementById('toggle_adv');if(p.style.display==='block'){p.style.display='none';b.innerText="⚙️ Opciones Avanzadas";window.setDefaults();}else{p.style.display='block';b.innerText="✖️ Ocultar y Restaurar a Atletismo";}};window.checkOtros=function(sId,pId){const v=document.getElementById(sId).value;document.getElementById(pId).style.display=(v==='Otros'||v==='Otra actividad o deporte')?'block':'none';};window.vR=function(r){var v=r.replace(/[^0-9kK]/g,"");if(v.length<8||v.length>9)return false;var c=v.slice(0,-1);var d=v.slice(-1).toUpperCase();var s=0;var m=2;for(var i=1;i<=c.length;i++){s=s+(m*c.charAt(c.length-i));m=(m<7)?m+1:2;}var de=11-(s%11);return d==((de==11)?0:((de==10)?"K":de));};window.generarLink=async function(){const nI=document.getElementById('nombre');const rI=document.getElementById('rut');const nVal=nI.value.trim();const rVal=rI.value.trim();const eB=document.getElementById('error-box');nI.classList.remove('input-error');rI.classList.remove('input-error');eB.style.display='none';if(nVal.length<3){nI.classList.add('input-error');eB.innerText="Por favor, ingresa el nombre del atleta.";eB.style.display='block';nI.focus();return;}if(!window.vR(rVal)){rI.classList.add('input-error');eB.innerText="El RUT ingresado no es válido.";eB.style.display='block';rI.focus();return;}const cleanRut=rVal.replace(/[^0-9kK]/g,"").toUpperCase();const enc=(val)=>encodeURIComponent(val).replace(/%20/g,"+");let p=[];p.push(_v(1)+"="+enc(nVal));p.push(_v(2)+"="+enc(cleanRut));p.push(_v(3)+"="+enc(document.getElementById('club').value.trim()));p.push(_v(4)+"="+enc(document.getElementById('profesor').value.trim()));p.push(_v(6)+"="+enc(document.getElementById('categoria').value));let dVal=document.getElementById('disciplina').value;if(dVal==='Otros'||dVal==='Otra actividad o deporte'){let dTxt=document.getElementById('otra_disc_txt').value.trim();p.push(_v(5)+"=__other_option__");p.push(_v(5)+".other_option_response="+enc(dTxt));dVal=dTxt;}else{p.push(_v(5)+"="+enc(dVal));}let reVal=document.getElementById('recinto').value;if(reVal==='Otros'){let reTxt=document.getElementById('otro_rec_txt').value.trim();p.push(_v(7)+"=__other_option__");p.push(_v(7)+".other_option_response="+enc(reTxt));}else{p.push(_v(7)+"="+enc(reVal));}document.getElementById("urlFinal").innerText=formBaseUrl+"?"+p.join("&");document.getElementById("resultado").style.display="block";document.getElementById("copy-toast").style.display="none";if(supabaseClient){try{await supabaseClient.from('registros').insert([{nombre:nVal,disciplina:dVal}]);}catch(error){console.error("DB error");}}};window.copiarLink=function(){const t=document.getElementById("urlFinal").innerText;const x=document.createElement("textarea");document.body.appendChild(x);x.value=t;x.select();document.execCommand("copy");document.body.removeChild(x);document.getElementById("copy-toast").style.display="block";};window.limpiarFormulario=function(){const n=document.getElementById('nombre');const r=document.getElementById('rut');n.value="";r.value="";n.classList.remove('input-error');r.classList.remove('input-error');document.getElementById('error-box').style.display='none';document.getElementById('resultado').style.display='none';window.setDefaults();n.focus();};window.onload=window.setDefaults;
  </script>
</body>
</html>
